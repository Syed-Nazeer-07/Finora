<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WealthSync – Forgot Password</title>
    <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='favicon-32x32.png') }}">
    <link rel="icon" type="image/png" sizes="16x16" href="{{ url_for('static', filename='favicon-16x16.png') }}">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='apple-touch-icon.png') }}">
    <link rel="manifest" href="{{ url_for('static', filename='site.webmanifest') }}">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = {theme: {extend: {colors: {brand: {400: '#60a5fa', 500: '#3b82f6', 600: '#2563eb'}}}}}</script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .field { position: relative; margin-bottom: 1rem; }
        .field input { width: 100%; padding: 1rem 1rem 1.5rem; border: 1px solid #e2e8f0; border-radius: 0.75rem; background: white; color: #0f172a; outline: none; transition: all 0.2s; }
        .field label { position: absolute; left: 1rem; top: 1rem; font-size: 0.875rem; color: #64748b; pointer-events: none; transition: all 0.2s; background: white; padding: 0 0.25rem; }
        .field input:focus + label, .field input:not(:placeholder-shown) + label { top: -0.5rem; left: 0.75rem; font-size: 0.75rem; font-weight: 600; color: #3b82f6; }
        .field input:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,.15); }
    </style>
</head>
<body class="bg-white min-h-screen flex items-center justify-center p-4 sm:p-6">
    <div class="w-full max-w-md">
        <a href="/login" class="flex items-center justify-center gap-2.5 mb-8 group">
            <span class="font-bold text-xl text-slate-900 group-hover:text-brand-600 transition-colors">WealthSync</span>
        </a>
        
        <div class="bg-white border border-slate-200 rounded-3xl overflow-hidden shadow-lg">
            <div class="h-1 bg-gradient-to-r from-brand-500 to-indigo-600"></div>
            
            <div id="form-state" class="p-8 sm:p-10">
                <div class="mb-7">
                    <h1 class="text-2xl font-bold text-slate-900 mb-1.5">Forgot your password?</h1>
                    <p class="text-slate-600 text-sm leading-relaxed">Enter your email address and we'll send you a link to reset your password.</p>
                </div>

                <form id="forgot-form" onsubmit="handleSubmit(event)" class="space-y-5">
                    <div class="field">
                        <input type="email" id="email" name="email" required placeholder=" " autocomplete="email" class="w-full px-4 py-3 bg-white border border-slate-200 rounded-2xl text-sm text-slate-900 focus:outline-none transition-all">
                        <label for="email">Email address</label>
                    </div>

                    <p id="form-error" class="text-rose-500 text-sm hidden"></p>

                    <button type="submit" id="submit-btn" class="w-full py-3.5 bg-gradient-to-r from-brand-600 to-indigo-600 hover:from-brand-500 hover:to-indigo-500 text-white rounded-2xl font-semibold text-sm shadow-lg hover:-translate-y-0.5 transition-all flex items-center justify-center gap-2">
                        <span>Send Reset Link</span>
                        <i data-lucide="send" class="w-4 h-4"></i>
                    </button>
                </form>
            </div>

            <div id="success-state" class="p-8 sm:p-10 text-center hidden">
                <div class="w-16 h-16 rounded-full bg-emerald-500/15 border border-emerald-500/25 flex items-center justify-center mx-auto mb-5">
                    <i data-lucide="mail-check" class="w-8 h-8 text-emerald-500"></i>
                </div>
                <h2 class="text-xl font-bold text-slate-900 mb-2">Check your inbox</h2>
                <p class="text-slate-600 text-sm leading-relaxed mb-1">If an account exists for</p>
                <p id="sent-email" class="font-semibold text-slate-900 text-sm mb-4"></p>
                <p class="text-slate-600 text-xs leading-relaxed mb-6">a password reset link has been sent. The link expires in <strong class="text-slate-700">1 hour</strong>.</p>
                <p class="text-slate-600 text-xs">Didn't get it? Check your spam folder or <button onclick="showForm()" class="text-brand-600 hover:text-brand-700 transition-colors underline">try again</button>.</p>
            </div>

            <div class="px-8 sm:px-10 pb-7 pt-0 border-t border-slate-200">
                <a href="/login" class="text-slate-600 hover:text-slate-900 text-xs transition-colors inline-flex items-center gap-1 mt-5">
                    <i data-lucide="arrow-left" class="w-3 h-3"></i> Back to sign in
                </a>
            </div>
        </div>
    </div>

<script>
    lucide.createIcons();

    async function handleSubmit(e) {
        e.preventDefault();
        const btn    = document.getElementById('submit-btn');
        const errEl  = document.getElementById('form-error');
        const email  = document.getElementById('email').value.trim();
        btn.disabled = true;
        btn.innerHTML = '<svg class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" stroke-dasharray="60" stroke-dashoffset="30"/></svg><span>Sending…</span>';
        errEl.classList.add('hidden');

        try {
            const res = await fetch('/api/auth/forgot-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            });
            if (!res.ok) throw new Error('Request failed');
            document.getElementById('sent-email').textContent = email;
            document.getElementById('form-state').classList.add('hidden');
            document.getElementById('success-state').classList.remove('hidden');
        } catch {
            errEl.textContent = 'Something went wrong. Please try again.';
            errEl.classList.remove('hidden');
            btn.disabled = false;
            btn.innerHTML = '<span>Send Reset Link</span><i data-lucide="send" class="w-4 h-4"></i>';
            lucide.createIcons({ nodes: [btn] });
        }
    }

    function showForm() {
        document.getElementById('success-state').classList.add('hidden');
        document.getElementById('form-state').classList.remove('hidden');
        const btn = document.getElementById('submit-btn');
        btn.disabled = false;
        btn.innerHTML = '<span>Send Reset Link</span><i data-lucide="send" class="w-4 h-4"></i>';
        lucide.createIcons({ nodes: [btn] });
    }
</script>
</body>
</html>
