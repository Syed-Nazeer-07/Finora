<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WealthSync - Premium Financial OS</title>
    
    <!-- Tailwind CSS with Custom Config -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Cal Sans', 'Inter', 'sans-serif'],
                    },
                    colors: {
                        dark: {
                            bg: '#0B0F19',
                            card: '#111827',
                            border: '#1F2937'
                        },
                        brand: {
                            50: '#eff6ff',
                            100: '#dbeafe',
                            400: '#60a5fa',
                            500: '#3b82f6',
                            600: '#2563eb',
                            900: '#1e3a8a',
                        }
                    },
                    animation: {
                        'float': 'float 3s ease-in-out infinite',
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' },
                        }
                    }
                }
            }
        }
    </script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-dark-bg dark:text-slate-200 transition-colors duration-300 antialiased min-h-screen flex overflow-hidden selection:bg-brand-500 selection:text-white">

    <!-- Sidebar Navigation -->
    <aside id="sidebar" class="-translate-x-full md:translate-x-0 transition-transform duration-300 fixed md:static inset-y-0 left-0 w-72 bg-white dark:bg-dark-card border-r border-slate-200 dark:border-dark-border z-40 flex flex-col h-screen">
        <!-- Logo -->
        <div class="h-20 flex items-center px-8 border-b border-slate-100 dark:border-dark-border/50 shrink-0">
            <div class="flex items-center gap-3">
                <!-- Professional SVG Logo -->
                <div class="p-2 bg-gradient-to-br from-brand-500 to-indigo-600 rounded-xl shadow-lg shadow-brand-500/30 text-white flex items-center justify-center">
                    <svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
                    </svg>
                </div>
                <span class="font-bold text-2xl tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-slate-900 to-slate-600 dark:from-white dark:to-slate-400">WealthSync</span>
            </div>
        </div>
        
        <!-- Navigation -->
        <div class="px-4 py-6 flex-1 overflow-y-auto">
            <p class="text-xs font-semibold text-slate-400 dark:text-slate-500 uppercase tracking-wider mb-4 px-4">Overview</p>
            <nav id="nav-menu" class="space-y-1">
                <!-- Navigation Items Injected via JS -->
            </nav>

            <p class="text-xs font-semibold text-slate-400 dark:text-slate-500 uppercase tracking-wider mt-8 mb-4 px-4">Insights</p>
            <nav id="nav-insights" class="space-y-1">
                <button onclick="App.setActiveTab('ai-coach')" id="nav-ai-coach" class="w-full flex items-center justify-between px-4 py-3 rounded-xl transition-all font-medium text-sm text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800/50 hover:text-slate-900 dark:hover:text-white group">
                    <div class="flex items-center gap-3">
                        <i data-lucide="sparkles" class="w-5 h-5 text-purple-500 group-hover:animate-pulse"></i>
                        Smart Coach
                    </div>
                    <span class="bg-purple-100 dark:bg-purple-900/30 text-purple-600 dark:text-purple-400 text-[10px] px-2 py-0.5 rounded-full font-bold">V2</span>
                </button>
            </nav>
        </div>
        
        <!-- User Profile & Gamification -->
        <div class="p-4 border-t border-slate-100 dark:border-dark-border/50 shrink-0 bg-slate-50/50 dark:bg-dark-card/50">
            <!-- Streak -->
            <div class="mb-4 flex items-center justify-between px-4 py-2 bg-orange-50 dark:bg-orange-900/10 rounded-xl border border-orange-100 dark:border-orange-900/30">
                <div class="flex items-center gap-2">
                    <span class="text-orange-500">🔥</span>
                    <span class="text-sm font-semibold text-orange-700 dark:text-orange-400">12 Day Streak</span>
                </div>
                <div class="w-2 h-2 rounded-full bg-orange-500 animate-pulse"></div>
            </div>

            <!-- Profile -->
            <div class="flex items-center justify-between px-2">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-slate-200 dark:bg-slate-700 flex items-center justify-center text-slate-500 dark:text-slate-300 shadow-sm ring-2 ring-white dark:ring-dark-bg">
                        <i data-lucide="user" class="w-5 h-5"></i>
                    </div>
                    <div>
                        <p class="text-sm font-bold text-slate-900 dark:text-white">Nazeer</p>
                        <p class="text-xs text-slate-500 dark:text-slate-400 flex items-center gap-1">
                            <i data-lucide="shield-check" class="w-3 h-3 text-brand-500"></i> Pro Member
                        </p>
                    </div>
                </div>
                <button onclick="App.toggleTheme()" class="p-2 text-slate-400 hover:text-brand-500 dark:hover:text-brand-400 transition-colors bg-white dark:bg-slate-800 rounded-lg shadow-sm border border-slate-100 dark:border-slate-700">
                    <i data-lucide="moon" id="theme-icon" class="w-5 h-5"></i>
                </button>
            </div>
        </div>
    </aside>

    <!-- Overlay for mobile -->
    <div id="sidebar-overlay" class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-30 hidden md:hidden transition-opacity" onclick="App.toggleMobileMenu()"></div>

    <!-- Main Content Area -->
    <main class="flex-1 flex flex-col h-screen overflow-hidden relative">
        <!-- Mobile Header -->
        <header class="md:hidden glass z-20 px-4 py-4 flex justify-between items-center sticky top-0 border-b border-slate-200 dark:border-dark-border">
            <div class="flex items-center gap-2">
                <div class="p-1.5 bg-gradient-to-br from-brand-500 to-indigo-600 rounded-lg text-white">
                    <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
                    </svg>
                </div>
                <span class="font-bold text-lg dark:text-white">WealthSync</span>
            </div>
            <div class="flex items-center gap-2">
                <button onclick="App.toggleTheme()" class="p-2 text-slate-600 dark:text-slate-300">
                    <i data-lucide="moon" id="theme-icon-mobile" class="w-5 h-5"></i>
                </button>
                <button onclick="App.toggleMobileMenu()" class="p-2 text-slate-600 dark:text-slate-300">
                    <i data-lucide="menu" id="mobile-menu-icon" class="w-6 h-6"></i>
                </button>
            </div>
        </header>

        <!-- Dynamic Content injected here -->
        <div id="main-content" class="flex-1 overflow-y-auto p-4 sm:p-8 lg:p-10 scroll-smooth">
            <!-- Content -->
        </div>
    </main>

    <!-- Modal Container -->
    <div id="modal-container"></div>

    <script src="/static/js/ui.js"></script>
    <script src="/static/js/charts.js"></script>
    <script src="/static/js/dashboard.js"></script>
    <script src="/static/js/transactions.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
