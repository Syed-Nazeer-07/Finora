<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finora – Email Verified</title>
    <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='favicon-32x32.png') }}?v=2">
    <link rel="icon" type="image/png" sizes="16x16" href="{{ url_for('static', filename='favicon-16x16.png') }}?v=2">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='apple-touch-icon.png') }}?v=2">
    <link rel="manifest" href="{{ url_for('static', filename='site.webmanifest') }}?v=2">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config={darkMode:'class',theme:{extend:{colors:{dark:{bg:'#0B0F19',card:'#111827',border:'#1F2937'},brand:{500:'#3b82f6',600:'#2563eb'}}}}}</script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body{font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased}
    </style>
</head>
<body class="bg-white min-h-screen flex items-center justify-center p-6">
    <div class="w-full max-w-md text-center">

        
        <div class="flex items-center justify-center gap-2.5 mb-10">
            <span class="font-bold text-xl text-slate-900">Finora</span>
        </div>

        
        <div class="bg-white border border-slate-200 rounded-3xl p-10">
            <div class="w-16 h-16 rounded-full bg-emerald-500/20 border border-emerald-500/30 flex items-center justify-center mx-auto mb-6 pop">
                <i data-lucide="check" class="w-8 h-8 text-emerald-600"></i>
            </div>

            <h1 class="text-2xl font-bold text-slate-900 mb-2" style="animation-delay:.1s">
                {% if name %}Hi {{ name }}, you're verified!{% else %}Email verified!{% endif %}
            </h1>
            <p class="text-slate-600 text-sm leading-relaxed mb-8" style="animation-delay:.15s">
                Your email has been confirmed. Sign in to set up your financial dashboard.
            </p>

            <a href="/login"
                class="block w-full py-3.5 bg-gradient-to-r from-brand-600 to-indigo-600 hover:from-brand-500 hover:to-indigo-500 text-slate-900 rounded-2xl font-semibold text-sm shadow-xl shadow-brand-900/50 hover:-translate-y-0.5 transition-all"
                style="animation-delay:.2s">
                Sign in to Finora
            </a>
        </div>
    </div>
<script>lucide.createIcons()</script>
</body>
</html>
