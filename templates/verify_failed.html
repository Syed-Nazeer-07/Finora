<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WealthSync – Link Expired</title>
    <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='favicon-32x32.png') }}">
    <link rel="icon" type="image/png" sizes="16x16" href="{{ url_for('static', filename='favicon-16x16.png') }}">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='favicon-180x180.png') }}">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config={darkMode:'class',theme:{extend:{colors:{dark:{bg:'#0B0F19',card:'#111827',border:'#1F2937'},brand:{500:'#3b82f6',600:'#2563eb'}}}}}</script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>body{font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased}</style>
</head>
<body class="bg-white min-h-screen flex items-center justify-center p-6">
    <div class="w-full max-w-md text-center">

        
        <div class="flex items-center justify-center gap-2.5 mb-10">
            <span class="font-bold text-xl text-slate-900">WealthSync</span>
        </div>

        
        <div class="bg-white border border-slate-200 rounded-3xl p-10">
            <div class="w-16 h-16 rounded-full bg-rose-500/20 border border-rose-500/30 flex items-center justify-center mx-auto mb-6">
                <i data-lucide="link-2-off" class="w-8 h-8 text-rose-600"></i>
            </div>

            <h1 class="text-2xl font-bold text-slate-900 mb-2">Link expired or invalid</h1>
            <p class="text-slate-600 text-sm leading-relaxed mb-8">
                This verification link is no longer valid. It may have expired after 24 hours or already been used.
            </p>

            
            <form onsubmit="resend(event)" class="space-y-3 mb-6">
                <input type="email" id="resend-email" required placeholder="Enter your email to get a new link"
                    class="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-2xl text-sm text-slate-900 placeholder-slate-500 focus:outline-none focus:border-brand-500 transition-all">
                <button type="submit" id="resend-btn"
                    class="w-full py-3 bg-gradient-to-r from-brand-600 to-indigo-600 hover:from-brand-500 hover:to-indigo-500 text-slate-900 rounded-2xl font-semibold text-sm transition-all hover:-translate-y-0.5">
                    Send new verification link
                </button>
                <p id="resend-msg" class="text-xs text-emerald-600 hidden"></p>
            </form>

            <a href="/login" class="text-slate-500 hover:text-slate-300 text-xs transition-colors">← Back to sign in</a>
        </div>
    </div>

<script>
    lucide.createIcons();
    async function resend(e) {
        e.preventDefault();
        const btn = document.getElementById('resend-btn');
        const msg = document.getElementById('resend-msg');
        const email = document.getElementById('resend-email').value;
        btn.disabled = true; btn.textContent = 'Sending…';
        await fetch('/api/auth/resend-verification', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({email})
        });
        msg.textContent = 'If that email is registered, a new link has been sent.';
        msg.classList.remove('hidden');
        btn.textContent = 'Send new verification link';
        btn.disabled = false;
    }
</script>
</body>
</html>
